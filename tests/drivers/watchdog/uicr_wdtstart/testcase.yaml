common:
  tags:
    - drivers
    - ci_tests_drivers_watchdog
  sysbuild: true
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "UICR.WDTSTART test on nrf54h20dk"
      - "RESET_PIN detected"
      - "Watchdog shall fire in"
      - "RESET_WATCHDOG detected"
      - "WATCHDOG was reconfigured"
      - "3: Watchdog was feed"
      - "WATCHDOG was disabled"
      - "Test is completed"
  timeout: 6
  platform_allow:
    - nrf54h20dk/nrf54h20/cpuapp
  integration_platforms:
    - nrf54h20dk/nrf54h20/cpuapp

tests:
  drivers.watchdog.uicr_wdtstart: {}
  drivers.watchdog.uicr_wdtstart.nrf_gswdt:
    extra_args:
      - FILE_SUFFIX=nrf_gswdt
