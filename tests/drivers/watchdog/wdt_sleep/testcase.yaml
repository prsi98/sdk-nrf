common:
  tags:
    - drivers
    - ci_tests_drivers_watchdog
  sysbuild: true
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "WDT Sleep test on"
      - "RESET_PIN detected"
      - "Watchdog did not reset the system while sleeping"
      - "Now we'll stay busy without feeding"
      - "RESET_WATCHDOG detected"
      - "Test is completed"
  platform_allow:
    - nrf54h20dk/nrf54h20/cpuapp
  integration_platforms:
    - nrf54h20dk/nrf54h20/cpuapp

tests:
  drivers.watchdog.wdt_sleep: {}
  drivers.watchdog.wdt_sleep.nrf_gswdt:
    extra_args:
      - FILE_SUFFIX=nrf_gswdt
