# nRF54L10 has no shared base MCUboot conf here, so this file is self-contained:
# SPI access to the external flash (mx25r64) for the secondary slot, a higher
# sector limit, and disabled fprotect with a larger stack for MCUboot.
CONFIG_FLASH=y
CONFIG_MULTITHREADING=y

CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=512

CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=32

CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y

CONFIG_FPROTECT=n
CONFIG_MAIN_STACK_SIZE=16384

CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_CBPRINTF_NANO=y
CONFIG_MINIMAL_LIBC=y

CONFIG_FW_INFO_FIRMWARE_VERSION=2
