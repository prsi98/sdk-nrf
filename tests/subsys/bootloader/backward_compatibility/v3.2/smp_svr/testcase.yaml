common:
  sysbuild: true
  build_only: true
  tags:
    - mcuboot
    - ci_tests_subsys_bootloader

tests:
  # BC-aware configuration for the smp_svr sample on nRF54H20 (Direct-XIP
  # with revert). Restores the v3.2 merged-slot CID values and partition node
  # shape expected by the v3.2 bootchain.
  mcuboot.backward_compatibility.smp_svr.bt.nrf54h20dk.direct_xip_withrevert:
    extra_args:
      - FILE_SUFFIX="merged_slot"
      - EXTRA_CONF_FILE="extra-bt.conf"
      - SB_CONFIG_MCUBOOT_MODE_DIRECT_XIP_WITH_REVERT=y
      - mcuboot_CONFIG_MULTITHREADING=y
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp

  # BC-aware configuration for the smp_svr sample (serial recovery) on
  # nRF52840, nRF5340, nRF54L15 and nRF54H20. The larger_mcuboot overlays pin
  # each platform's released v3.2 flash map (boot region + slot0 offset) via
  # devicetree so the signed application lands where the v3.2 MCUboot on the
  # device boots it.
  mcuboot.backward_compatibility.smp_svr.serial_recovery:
    extra_args:
      - SB_CONFIG_BOOTLOADER_MCUBOOT=y
      - mcuboot_CONFIG_MCUBOOT_SERIAL=y
      - mcuboot_CONFIG_UART_CONSOLE=n
      - mcuboot_CONFIG_MCUBOOT_INDICATION_LED=y
      - mcuboot_CONFIG_BOOT_SERIAL_NO_APPLICATION=y
      - FILE_SUFFIX=larger_mcuboot
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54h20dk@0.9.0/nrf54h20/cpuapp

  # BC-aware configuration for the smp_svr sample on nRF54H20 (ext_flash,
  # two-image build). The memory-map/bootchain overlays re-pin the v3.2 update
  # slot geometry in external flash so the image lands where v3.2 MCUboot
  # expects.
  mcuboot.backward_compatibility.smp_svr.bt.nrf54h20dk.ext_flash:
    extra_args:
      - FILE_SUFFIX="ext_flash"
      - EXTRA_CONF_FILE="extra-bt.conf"
      - mcuboot_CONFIG_MULTITHREADING=y
      - mcuboot_CONFIG_BOOT_IMG_HASH_DIRECTLY_ON_STORAGE=n
      - mcuboot_CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
      - mcuboot_CONFIG_BOOT_MAX_IMG_SECTORS=512
      - mcuboot_CONFIG_FLASH_MSPI_NOR_LAYOUT_PAGE_SIZE=4096
      - SB_CONFIG_NETCORE_IPC_RADIO=y
      - SB_CONFIG_NETCORE_IPC_RADIO_BT_HCI_IPC=y
      - CONFIG_MCUMGR_GRP_IMG_ALLOW_CONFIRM_NON_ACTIVE_IMAGE_ANY=y
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp

  # BC-aware configuration for the smp_svr sample on nRF54L15 (swap-using
  # -move). boards/nrf54l15dk_nrf54l15_cpuapp_bt.overlay re-pins the v3.2 slot0
  # layout so the primary-slot trailer stays where the v3.2 MCUboot expects it.
  mcuboot.backward_compatibility.smp_svr.bt.nrf54l15:
    extra_args:
      - FILE_SUFFIX=bt
      - EXTRA_CONF_FILE="extra-bt.conf"
      - SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp

  # BC-aware configuration for the smp_svr sample on nRF54L15 (swap-using
  # -move, secondary slot in external flash). Same primary-slot trailer-offset
  # issue as the internal-flash config; the ext_flash overlay re-pins the v3.2
  # geometry.
  mcuboot.backward_compatibility.smp_svr.bt.nrf54l15dk.ext_flash:
    extra_args:
      - FILE_SUFFIX=ext_flash
      - EXTRA_CONF_FILE="extra-bt.conf"
      - SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54l15dk/nrf54l10/cpuapp

  # BC-aware configuration for the smp_svr sample on nRF52840dk (swap
  # -using-move). boards/nrf52840dk_nrf52840_bt.overlay re-pins the v3.2 slot0
  # layout (folding the mcuboot_pad into the start of slot0) so the primary-
  # slot trailer stays where the v3.2 MCUboot expects it.
  mcuboot.backward_compatibility.smp_svr.bt.nrf52840dk:
    extra_args:
      - FILE_SUFFIX=bt
      - EXTRA_CONF_FILE="extra-bt.conf"
      - SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
    platform_allow:
      - nrf52840dk/nrf52840
