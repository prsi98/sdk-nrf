common:
  sysbuild: true
  build_only: true
  tags:
    - mcuboot
    - ci_tests_subsys_bootloader

tests:
  # BC-aware configuration for the dfu_multi_image sample on nRF54H20.
  # Restores the reduced MCUboot code size configuration from NCS v3.2.
  mcuboot.backward_compatibility.dfu_multi_image:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
