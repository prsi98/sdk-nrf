common:
  sysbuild: true
  build_only: true
  tags:
    - mcuboot
    - ci_tests_subsys_bootloader

tests:
  # BC-aware configuration for the AB Direct-XIP sample on nRF54L15.
  # nrf54l15dk_nrf54l15_cpuapp_common.dtsi pins the partition layout (no
  # Partition Manager) to the NCS v3.2 flash map so the update image is
  # accepted by an NCS v3.2 MCUboot.
  mcuboot.backward_compatibility.ab:
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
