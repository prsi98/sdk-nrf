common:
  sysbuild: true
  build_only: true
  tags:
    - mcuboot
    - ci_tests_subsys_bootloader

tests:
  # BC-aware configuration for the smp_svr_mini_boot sample on nRF54L15,
  # Direct-XIP update image (second-slot variant). The board overlays pin the
  # released NCS v3.2.0 flash map (slots 0x8000/0x68800, size 0x60800) via an
  # RRAM erase-block-size override, since current-dev's DTS migration would
  # shift the primary-slot trailer and break confirmation.
  mcuboot.backward_compatibility.smp_svr_mini_boot:
    extra_args:
      - SB_CONFIG_MCUBOOT_MODE_DIRECT_XIP=y
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp

  # BC-aware configuration for the smp_svr_mini_boot sample on nRF54L15,
  # swap-using-move update image (single application image, no variant).
  mcuboot.backward_compatibility.smp_svr_mini_boot.swap_move:
    extra_args:
      - SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
    extra_configs:
      - CONFIG_MCUMGR_GRP_IMG_ALLOW_CONFIRM_NON_ACTIVE_IMAGE_ANY=y
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
