common:
  sysbuild: true
  tags:
    - b0
    - fw_info
    - sysbuild
    - ci_tests_subsys_fw_info
tests:
  fw_info.core:
    platform_allow:
      - nrf9160dk/nrf9160
      - nrf52840dk/nrf52840
      - nrf52dk/nrf52832
      - nrf5340dk/nrf5340/cpuapp
    integration_platforms:
      - nrf52840dk/nrf52840
  fw_info.code.kmu:
    platform_allow:
      - nrf54l15dk/nrf54l15/cpuapp
    extra_args:
      - SB_CONFIG_SECURE_BOOT_GENERATE_DEFAULT_KMU_KEYFILE=y
